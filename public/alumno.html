<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos - Anima App</title>
    <link rel="stylesheet" href="/public/css/alumno.css">
</head>
<body>

     <nav class="navbar">
        <div class="nav-container">
            <a href="indexalumno.html" class="nav-logo">GYM<span>APP</span></a>

            <button class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="nav-links">
                <li><a href="/public/indexprofesor.html" class="nav-item">Inicio</a></li>
                <li><a href="/public/alumno.html" class="nav-item active">Alumnos</a></li>
                <li><a href="/public/rutina.html" class="nav-item">Rutinas</a></li>
                <li><a href="/public/comentarios.html" class="nav-item">Comentarios</a></li>
                <li><a href="#" class="nav-item btn-logout" onclick="cerrarSesion()">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="header-section">
            <h1>Gestión de Alumnos</h1>
            <button class="btn-agregar" onclick="abrirModal()">+ Agregar Nuevo Alumno</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre y Apellido</th>
                        <th>Email</th>
                        <th>Edad</th>
                        <th>Fecha de alta</th>
                        <th>Estado</th>
                        <th >Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaAlumnosReal">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modalAlumno" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <h2>Registrar Alumno</h2>
            <form id="formAlumno">
                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan" required>
                </div>
                <div class="input-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" placeholder="Ej: Pérez" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                 <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="passAlumno" placeholder="Contraseña temporal" required>
                </div>
                <div class="input-group">
                    <label>Edad</label>
                    <input type="number" id="edad" placeholder="25" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-confirm">Guardar Alumno</button>
                    <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>

const menuToggle = document.getElementById('mobile-menu');
const navLinks = document.querySelector('.nav-links');

menuToggle.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    
    // Animación simple de las barritas
    menuToggle.classList.toggle('is-active');
});

// 1. VARIABLES GLOBALES
    const formulario = document.getElementById('formAlumno');
    const tabla = document.getElementById('tablaAlumnosReal');
    const modal = document.getElementById('modalAlumno');
    // Obtenemos tu sesión (Asegúrate que en el login guardes como 'usuario')
    const miSesion = JSON.parse(localStorage.getItem('usuario'));

    // 2. CONTROL DE ACCESO (Seguridad)
    if (!miSesion || miSesion.rol !== 'profesor') {
        alert("Acceso denegado");
        window.location.href = 'sesion.html';
    }

    // 3. FUNCIONES DEL MODAL
    function abrirModal() {
        modal.style.display = 'block';
    }

    function cerrarModal() {
        modal.style.display = 'none';
        formulario.reset();
    }

    // 4. FUNCIÓN PARA CARGAR LA TABLA (Traer datos de MySQL)
async function cargarAlumnos() {
    const tabla = document.getElementById('tablaAlumnosReal');
    const miSesion = JSON.parse(localStorage.getItem('usuario'));

    try {
        const respuesta = await fetch(`http://localhost:3000/api/alumnos/${miSesion.id}`);
        const alumnos = await respuesta.json();

        tabla.innerHTML = ""; 

        alumnos.forEach(alum => {
            const fecha = new Date(alum.fecha_alta).toLocaleDateString();
            const estaActivo = alum.estado === 1;
            
            const tr = document.createElement('tr');
            if (!estaActivo) tr.style.opacity = "0.5";

            // Aquí armamos la fila sin dejar palabras sueltas que den error
tr.innerHTML = `
    <td data-label="Nombre"><span>${alum.nombre} ${alum.apellido}</span></td>
    <td data-label="Email"><span>${alum.email}</span></td>
    <td data-label="Edad"><span>${alum.edad}</span></td>
    <td data-label="Fecha"><span>${fecha}</span></td>
    <td data-label="Estado"><span>${estaActivo ? 'Activo' : 'Pausado'}</span></td>
    <td data-label="Acciones" class="actions-cell">
        <button class="btn-action" onclick="editar(${alum.id})">✏️</button>
        <button class="btn-action" id="btn-estado-${alum.id}">${estaActivo ? '⏸️' : '▶️'}</button>
        <button class="btn-action" onclick="eliminar(${alum.id})">🗑️</button>
    </td>
`;
            
            tabla.appendChild(tr);

            // Vinculamos el evento de forma segura (así evitamos el "not defined")
            document.getElementById(`btn-estado-${alum.id}`).addEventListener('click', () => {
                cambiarEstado(alum.id, alum.estado);
            });
        });
    } catch (error) {
        console.error("Error cargando tabla:", error);
    }
}

    // 5. FUNCIÓN PARA GUARDAR (Enviar a MySQL)
    formulario.addEventListener('submit', async (e) => {
        e.preventDefault();

        const nuevoAlumno = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            email: document.getElementById('email').value,
            password: document.getElementById('passAlumno').value,
            edad: document.getElementById('edad').value,
            profesor_id: miSesion.id // Te vinculamos automáticamente
        };

        try {
            const res = await fetch('http://localhost:3000/api/alumnos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoAlumno)
            });

            if (res.ok) {
                alert("✅ Alumno guardado con éxito");
                cerrarModal();
                cargarAlumnos(); // Refrescamos la tabla sin recargar la página
            } else {
                alert("❌ Error al guardar");
            }
        } catch (error) {
            alert("No hay conexión con el servidor (Node)");
        }
    });

    // 6. INICIO AUTOMÁTICO
    // Apenas carga la página, traemos los alumnos
    document.addEventListener('DOMContentLoaded', cargarAlumnos);


// ELIMINAR ALUMNO
async function eliminar(id) {
    if (confirm("¿Estás seguro de que deseas dar de baja a este alumno?")) {
        try {
            const res = await fetch(`http://localhost:3000/api/alumnos/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert("Alumno eliminado correctamente");
                cargarAlumnos(); // Recargamos la tabla para que desaparezca
            } else {
                alert("Error al eliminar el alumno");
            }
        } catch (error) {
            console.error("Error de conexión:", error);
        }
    }
}

// EDITAR ALUMNO
function editar(id) {
    alert("Función para editar el alumno ID: " + id + " próximamente disponible.");
    // Aquí podrías abrir un modal con los datos cargados para modificar
}




async function cambiarEstado(id, estadoActual) {
    const nuevoEstado = estadoActual === 1 ? 0 : 1;
    console.log(`Intentando cambiar alumno ${id} al estado: ${nuevoEstado}`);

    try {
        const res = await fetch(`http://localhost:3000/api/alumnos/estado/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nuevoEstado: nuevoEstado })
        });

        if (res.ok) {
            console.log("Servidor respondió OK");
            await cargarAlumnos(); // Esto vuelve a dibujar la tabla con los datos nuevos
        } else {
            const errorMsg = await res.text();
            alert("El servidor no pudo actualizar: " + errorMsg);
        }
    } catch (error) {
        console.error("Error de red:", error);
        alert("No se pudo conectar con el servidor.");
    }
}




// Cargar la tabla apenas se abre la página
document.addEventListener('DOMContentLoaded', cargarAlumnos);







// MODIFICA tu función cargarAlumnos para que incluya los data-label:
alumnos.forEach(alum => {
    const tr = document.createElement('tr');
    const estaActivo = parseInt(alum.estado) === 1;

    tr.innerHTML = `
        <td data-label="Alumno">${alum.nombre} ${alum.apellido}</td>
        <td data-label="Email">${alum.email}</td>
        <td data-label="Edad">${alum.edad}</td>
        <td data-label="Alta">${new Date(alum.fecha_alta).toLocaleDateString()}</td>
        <td data-label="Estado">
            <span class="badge ${estaActivo ? 'bg-success' : 'bg-danger'}">
                ${estaActivo ? 'Activo' : 'Pausado'}
            </span>
        </td>
        <td class="actions-cell">
            <button class="btn-action" onclick="editar(${alum.id})">✏️</button>
            <button class="btn-action" onclick="cambiarEstado(${alum.id}, ${alum.estado})">
                ${estaActivo ? '⏸️' : '▶️'}
            </button>
            <button class="btn-action" onclick="eliminar(${alum.id})">🗑️</button>
        </td>
    `;
    tabla.appendChild(tr);
});




// 3. FUNCIÓN DE CIERRE DE SESIÓN
function cerrarSesion() {
    localStorage.removeItem('usuarioLogueado');
    window.location.href = 'sesion.html';
}




    </script>
</body>
</html>
